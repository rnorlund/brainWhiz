<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>brainWhiz — gallery</title>
<style>
  :root{ --bg:#070a12; --fg:#eaf2ff; --accent:#7fc0ff; }
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 800px at 50% 42%, #11203a 0%, #0a0f1c 45%, #05070d 100%);
    color:var(--fg);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  a{color:inherit;text-decoration:none}
  /* password gate */
  #gate{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:#070a12}
  #gate.on{display:flex} #gate .box{background:#141d2e;border:1px solid #2a3a55;border-radius:14px;padding:30px 34px;width:300px;text-align:center}
  #gate h2{margin:0 0 4px} #gate p{margin:0 0 14px;font-size:12px;color:#9fb3c8}
  #gate input{width:100%;padding:9px 11px;border-radius:8px;border:1px solid #2a3a55;background:#0b1220;color:#eaf2ff}
  #gate button{margin-top:12px;width:100%;padding:9px;border:0;border-radius:8px;background:#2f6fed;color:#fff;font-weight:600;cursor:pointer}
  #gate .msg{min-height:14px;margin-top:8px;font-size:12px;color:#ff7b7b}
  /* header */
  header{position:fixed;top:18px;left:0;right:0;text-align:center;z-index:5;pointer-events:none}
  header h1{margin:0;font-size:26px;letter-spacing:.5px;font-weight:800}
  header h1 .w{color:var(--accent)} header p{margin:4px 0 0;font-size:13px;color:#9fb3c8}
  /* stage / ring */
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #ring{position:relative;width:min(92vmin,860px);height:min(92vmin,860px)}
  .center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:34%;height:34%;border-radius:50%;
    overflow:hidden;cursor:pointer;border:2px solid rgba(127,192,255,.5);box-shadow:0 0 0 6px rgba(127,192,255,.06),0 0 70px rgba(80,150,255,.35);
    animation:breathe 6s ease-in-out infinite}
  .center img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(1.05)}
  .center .clabel{position:absolute;inset:auto 0 0 0;padding:10px 0 12px;text-align:center;font-weight:700;font-size:15px;
    background:linear-gradient(transparent,rgba(5,8,14,.85))}
  .center .clabel small{display:block;font-weight:400;font-size:10px;color:var(--accent);opacity:.9}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 6px rgba(127,192,255,.06),0 0 60px rgba(80,150,255,.30)}50%{box-shadow:0 0 0 10px rgba(127,192,255,.10),0 0 95px rgba(120,170,255,.5)}}
  .plate{position:absolute;left:50%;top:50%;width:16.5%;height:16.5%;margin:-8.25% 0 0 -8.25%;border-radius:50%;
    overflow:hidden;cursor:pointer;border:1.5px solid rgba(150,180,220,.35);background:#0b1220;
    box-shadow:0 6px 20px rgba(0,0,0,.5);transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease}
  .plate img,.plate video{width:100%;height:100%;object-fit:cover;display:block}
  .plate .shine{position:absolute;inset:0;background:linear-gradient(115deg,transparent 30%,rgba(180,215,255,.55) 48%,transparent 66%);
    transform:translateX(-130%);animation:shimmer 9s ease-in-out infinite}
  @keyframes shimmer{0%,82%{transform:translateX(-130%)}90%{transform:translateX(130%)}100%{transform:translateX(130%)}}
  .plate .lab{position:absolute;inset:auto 0 0 0;padding:14px 4px 5px;font-size:10.5px;font-weight:600;text-align:center;
    background:linear-gradient(transparent,rgba(5,8,14,.9));opacity:0;transition:opacity .2s}
  .plate:hover{transform:scale(1.18);z-index:10;border-color:var(--accent);box-shadow:0 10px 34px rgba(0,0,0,.65),0 0 26px rgba(120,170,255,.6)}
  .plate:hover .lab{opacity:1}
  footer{position:fixed;bottom:12px;left:0;right:0;text-align:center;font-size:11px;color:#7e93b3;z-index:5}
  footer a{color:var(--accent)}
  #tip{position:fixed;bottom:34px;left:0;right:0;text-align:center;font-size:12px;color:#9fb3c8;z-index:5;pointer-events:none}
  @media (max-width:520px){ header h1{font-size:20px} .plate .lab{font-size:9px} }
</style></head><body>
<div id="gate"><div class="box"><h2>🧠 brainWhiz</h2><p>Enter the password to view the gallery.</p>
  <input id="gpw" type="password" placeholder="Password" autocomplete="off"><button id="ggo">Enter</button><div class="msg" id="gmsg"></div></div></div>

<header><h1>brain<span class="w">Whiz</span> · gallery</h1><p>16 things you can do — click any plate to launch the live demo</p></header>
<div id="stage"><div id="ring"></div></div>
<div id="tip">hover a plate for its name · the center opens the full viewer</div>
<footer>made with <a href="index.html">brainWhiz</a> · a multi-atlas exploding-brain viewer &amp; figure tool</footer>

<script>
(function(){ // gate (deterrent; same scope as the app)
  if(location.hostname==='rnorlund.github.io' && sessionStorage.getItem('bwz_ok')!=='1'){
    const HASH='f49fbf54f76506fc377429027a1c43224f966ba71f3fa106bb13848a58feabb9';
    const g=document.getElementById('gate'); g.classList.add('on'); const inp=document.getElementById('gpw');
    async function sha(s){ const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''); }
    async function go(){ if(await sha(inp.value)===HASH){ sessionStorage.setItem('bwz_ok','1'); g.classList.remove('on'); } else { document.getElementById('gmsg').textContent='Incorrect password.'; inp.value=''; } }
    document.getElementById('ggo').addEventListener('click',go); inp.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); }); setTimeout(()=>inp.focus(),60);
  }
})();
fetch('exampleFiles/gallery.json').then(r=>r.json()).then(G=>{
  const ring=document.getElementById('ring'); const P='exampleFiles/';
  // center hero
  const c=document.createElement('a'); c.className='center'; c.href='index.html'; c.title='Open the full brainWhiz viewer';
  c.innerHTML='<img src="'+P+(G.hero||'thumbs/language.png')+'" alt=""><div class="clabel">Open viewer<small>full brainWhiz</small></div>';
  ring.appendChild(c);
  const N=G.demos.length, R=42; // % radius
  G.demos.forEach((d,i)=>{ const ang=(i/N)*2*Math.PI - Math.PI/2; const x=50+R*Math.cos(ang), y=50+R*Math.sin(ang);
    const a=document.createElement('a'); a.className='plate'; a.href='index.html?demo='+d.id; a.title=d.title;
    a.style.left=x+'%'; a.style.top=y+'%';
    const media = d.media ? ('<video src="'+P+d.media+'" muted loop autoplay playsinline></video>') : ('<img src="'+P+d.thumb+'" alt="">');
    a.innerHTML=media+'<div class="shine"></div><div class="lab">'+d.title+'</div>';
    a.querySelector('.shine').style.animationDelay=(i*0.6)+'s';
    ring.appendChild(a); });
}).catch(e=>{ document.getElementById('ring').innerHTML='<p style="text-align:center;opacity:.7">gallery.json not found — run the generator.</p>'; });
</script>
</body></html>
